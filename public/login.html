<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Scanner Fundamentalista</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        /* Variáveis de Cores do Projeto */
        :root {
            --primary-color: #0052cc;
            --primary-hover: #003b91;
            --background-color: #f4f7fa;
            --card-background: #ffffff;
            --text-color: #333333;
            --label-color: #667788;
            --border-color: #dde4ec;
            --good-color: #28a745;
            --bad-color: #dc3545;
        }

        /* Estilos Globais da Página de Login */
        body.login-page {
            font-family: 'Inter', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background-color: var(--background-color);
            margin: 0;
            color: var(--text-color);
        }

        /* Card Central */
        .login-card {
            background: var(--card-background);
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0, 30, 80, 0.08);
            width: 100%;
            max-width: 400px;
            text-align: center;
            box-sizing: border-box;
        }

        .login-card h1 { 
            color: var(--primary-color); 
            margin: 0 0 10px; 
            font-weight: 700;
        }

        .login-card p { 
            color: var(--label-color); 
            margin: 0 0 30px; 
        }
        
        /* Formulários */
        .form-group { 
            text-align: left; 
            margin-bottom: 20px; 
        }

        .form-group label { 
            display: block; 
            margin-bottom: 8px; 
            color: var(--text-color); 
            font-weight: 500; 
        }

        .form-group input { 
            width: 100%; 
            padding: 12px; 
            border: 1px solid var(--border-color); 
            border-radius: 8px; 
            box-sizing: border-box; 
            font-size: 16px;
            font-family: 'Inter', sans-serif;
            transition: border-color 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(0, 82, 204, 0.2);
        }
        
        /* Botões e Links */
        button.btn-auth {
            width: 100%; 
            padding: 14px; 
            background-color: var(--primary-color); 
            color: white;
            border: none; 
            border-radius: 8px; 
            font-size: 16px; 
            font-weight: bold;
            cursor: pointer; 
            transition: background 0.3s;
            font-family: 'Inter', sans-serif;
        }

        button.btn-auth:hover { 
            background-color: var(--primary-hover); 
        }
        
        .toggle-link { 
            margin-top: 20px; 
            font-size: 14px; 
            color: var(--label-color); 
        }

        .toggle-link span { 
            color: var(--primary-color); 
            cursor: pointer; 
            font-weight: bold; 
        }
        
        /* Mensagens de Sucesso e Erro */
        .message { 
            padding: 12px; 
            border-radius: 8px; 
            margin-bottom: 20px; 
            display: none; 
            font-size: 14px; 
            font-weight: 500;
        }
        
        .error { 
            background: #ffebee; 
            color: var(--bad-color); 
            border: 1px solid #ef9a9a; 
        }
        
        .success { 
            background: #e8f5e9; 
            color: var(--good-color); 
            border: 1px solid #a5d6a7; 
        }
    </style>
</head>
<body class="login-page">

    <div class="login-card" id="card-login">
        <h1>Bem-vindo</h1>
        <p>Entre para analisar seus ativos na B3</p>
        <div id="msg-login" class="message"></div>

        <form id="form-login">
            <div class="form-group">
                <label>E-mail</label>
                <input type="email" id="email-login" placeholder="seu@email.com" required>
            </div>
            <div class="form-group">
                <label>Senha</label>
                <input type="password" id="pass-login" placeholder="Sua senha" required>
            </div>
            <button type="submit" class="btn-auth">Entrar</button>
        </form>
        <div class="toggle-link">
            Não tem conta? <span onclick="showRegister()">Criar agora</span>
        </div>
    </div>

    <div class="login-card" id="card-register" style="display: none;">
        <h1>Criar Conta</h1>
        <p>Comece a investir de forma inteligente</p>
        <div id="msg-register" class="message"></div>

        <form id="form-register">
            <div class="form-group">
                <label>E-mail</label>
                <input type="email" id="email-register" placeholder="seu@email.com" required>
            </div>
            <div class="form-group">
                <label>Senha</label>
                <input type="password" id="pass-register" placeholder="Crie uma senha" required>
            </div>
            <button type="submit" class="btn-auth">Cadastrar</button>
        </form>
        <div class="toggle-link">
            Já tem conta? <span onclick="showLogin()">Fazer Login</span>
        </div>
    </div>

    <script>
        // Funções para trocar de tela
        function showRegister() {
            document.getElementById('card-login').style.display = 'none';
            document.getElementById('card-register').style.display = 'block';
            clearMsgs();
        }
        
        function showLogin() {
            document.getElementById('card-register').style.display = 'none';
            document.getElementById('card-login').style.display = 'block';
            clearMsgs();
        }
        
        function clearMsgs() {
            document.querySelectorAll('.message').forEach(el => el.style.display = 'none');
        }
        
        function showMessage(elementId, text, type) {
            const el = document.getElementById(elementId);
            el.textContent = text;
            el.className = `message ${type}`;
            el.style.display = 'block';
        }

        // LÓGICA DE LOGIN
        document.getElementById('form-login').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email-login').value;
            const password = document.getElementById('pass-login').value;

            try {
                const res = await fetch('/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const data = await res.json();

                if (res.ok) {
                    // SUCESSO: Salva as informações e redireciona para a tela do Scanner
                    localStorage.setItem('user_token', data.token); 
                    localStorage.setItem('user_email', data.user.email);
                    window.location.href = '/index.html'; 
                } else {
                    showMessage('msg-login', data.error, 'error');
                }
            } catch (error) {
                showMessage('msg-login', 'Erro ao conectar no servidor.', 'error');
            }
        });

        // LÓGICA DE CADASTRO
        document.getElementById('form-register').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email-register').value;
            const password = document.getElementById('pass-register').value;

            try {
                const res = await fetch('/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const data = await res.json();

                if (res.ok) {
                    showMessage('msg-register', 'Conta criada! Faça login.', 'success');
                    setTimeout(() => showLogin(), 2000);
                } else {
                    showMessage('msg-register', data.error, 'error');
                }
            } catch (error) {
                showMessage('msg-register', 'Erro ao conectar no servidor.', 'error');
            }
        });
    </script>
</body>
</html>
