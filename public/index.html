<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scanner de Ativos Fundamentalista</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

        :root {
            --bg-color: #f4f7fa;
            --card-bg: #ffffff;
            --primary: #0052cc;
            --primary-hover: #003b91;
            --text-main: #333333;
            --text-muted: #667788;
            --border: #dde4ec;
            --good: #28a745;
            --bad: #dc3545;
            --neutral: #6c757d;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 2rem 1rem;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 1000px;
        }

        .header-tabs {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 20px;
            background: var(--card-bg);
            padding: 10px;
            border-radius: 50px;
            box-shadow: 0 2px 10px rgba(0, 30, 80, 0.08);
            width: fit-content;
            margin-left: auto;
            margin-right: auto;
        }

        .tab-btn {
            background-color: transparent;
            border: none;
            color: var(--text-muted);
            padding: 10px 30px;
            border-radius: 30px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .tab-btn.active, .tab-btn:hover {
            background-color: var(--primary);
            color: white;
        }

        .profile-selector {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            margin-bottom: 30px;
        }

        .profile-selector label {
            font-weight: 600;
            color: var(--text-main);
        }

        .profile-selector select {
            padding: 10px 15px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background-color: var(--card-bg);
            font-family: 'Inter', sans-serif;
            font-size: 1rem;
            color: var(--text-main);
            outline: none;
            cursor: pointer;
        }

        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 40px;
            background: var(--card-bg);
            padding: 8px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 30, 80, 0.05);
        }

        .search-box input {
            flex: 1;
            padding: 15px 20px;
            font-size: 1.1rem;
            border: none;
            border-radius: 8px;
            outline: none;
            background: transparent;
        }

        .search-box button {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 0 30px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 1.05rem;
            cursor: pointer;
            transition: background 0.3s;
        }

        .search-box button:hover {
            background-color: var(--primary-hover);
        }

        .results-header {
            text-align: center;
            font-size: 1.8rem;
            color: var(--text-main);
            margin-bottom: 40px;
            font-weight: 500;
        }

        .results-header span {
            color: var(--primary);
            font-weight: 700;
            font-size: 2.2rem;
            display: block;
            margin-top: 5px;
        }

        .section-title {
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--text-main);
            margin: 40px 0 20px;
            border-bottom: 2px solid var(--border);
            padding-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .results-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 15px rgba(0, 30, 80, 0.04);
            border-left: 5px solid transparent;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(0, 30, 80, 0.08);
        }

        .card.good { border-left-color: var(--good); }
        .card.bad { border-left-color: var(--bad); }
        .card.neutral { border-left-color: var(--border); }

        .card-title {
            font-size: 0.9rem;
            color: var(--text-muted);
            font-weight: 600;
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .card-body {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            gap: 12px;
        }

        .card-value {
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--text-main);
            text-align: right;
            word-break: break-word;
        }

        .message {
            text-align: center;
            padding: 40px;
            color: var(--text-muted);
            font-size: 1.2rem;
            background: var(--card-bg);
            border-radius: 12px;
            border: 1px solid var(--border);
            box-shadow: 0 4px 15px rgba(0, 30, 80, 0.03);
        }
        
        .profile-badge {
            display: inline-block;
            font-size: 0.9rem;
            background-color: var(--border);
            padding: 4px 12px;
            border-radius: 12px;
            vertical-align: middle;
            margin-left: 10px;
            color: var(--text-muted);
        }
    </style>
</head>
<body>

    <div class="container">
        
        <div class="header-tabs">
            <button class="tab-btn active" onclick="setMode('acoes')" id="btn-acoes">Ações</button>
            <button class="tab-btn" onclick="setMode('fiis')" id="btn-fiis">FIIs</button>
        </div>

        <div class="profile-selector" id="profileContainer">
            <label for="profileSelect">Avaliar sob a ótica do Perfil:</label>
            <select id="profileSelect">
                <option value="conservador">Conservador (Foco em Segurança e Dividendos)</option>
                <option value="moderado" selected>Moderado (Equilíbrio Valor e Crescimento)</option>
                <option value="arrojado">Arrojado (Foco em Crescimento Acelerado)</option>
            </select>
        </div>

        <div class="search-box">
            <input type="text" id="tickerInput" placeholder="Digite o ticker (ex: PETR4, BBAS3)">
            <button onclick="buscar()">Pesquisar</button>
        </div>

        <div id="resultContainer">
            <div class="message">Escolha a categoria, seu perfil e digite um ativo para iniciar a análise fundamentalista.</div>
        </div>
    </div>

    <script>
        let currentMode = 'acoes';

        function setMode(mode) {
            currentMode = mode;
            document.getElementById('btn-acoes').classList.remove('active');
            document.getElementById('btn-fiis').classList.remove('active');
            document.getElementById(`btn-${mode}`).classList.add('active');

            const placeholder = mode === 'acoes' ? 'ex: PETR4, BBAS3, WEGE3' : 'ex: MXRF11, HGLG11, KNCR11';
            document.getElementById('tickerInput').placeholder = `Digite o ticker (${placeholder})`;
            document.getElementById('tickerInput').value = '';
            
            document.getElementById('profileContainer').style.display = 'flex';
            
            document.getElementById('resultContainer').innerHTML = `<div class="message">Pronto para buscar ${mode === 'acoes' ? 'Ações' : 'FIIs'}.</div>`;
        }

        function getIcon(cls) {
            if (cls === 'good') {
                return `<svg style="color:var(--good); min-width: 24px;" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>`;
            }
            if (cls === 'bad') {
                return `<svg style="color:var(--bad); min-width: 24px;" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>`;
            }
            return ``;
        }

        function createCard(title, dataObj) {
            const val = dataObj?.value || '-';
            const cls = dataObj?.class || 'neutral';
            return `
                <div class="card ${cls}">
                    <div class="card-title">${title}</div>
                    <div class="card-body">
                        ${getIcon(cls)}
                        <span class="card-value">${val}</span>
                    </div>
                </div>
            `;
        }

        function apenasValor(dataObj) {
            if (!dataObj) return { value: '-', class: 'neutral' };
            return { value: dataObj.value, class: 'neutral' };
        }

        async function buscar() {
            const ticker = document.getElementById('tickerInput').value.trim().toUpperCase();
            const profile = document.getElementById('profileSelect').value;
            const container = document.getElementById('resultContainer');

            if (!ticker) {
                container.innerHTML = `<div class="message" style="color: var(--bad); border-left: 5px solid var(--bad);">Por favor, digite um ticker válido.</div>`;
                return;
            }

            container.innerHTML = `<div class="message">Aspirando dados de <strong>${ticker}</strong>... Aguarde um instante.</div>`;
            const endpoint = currentMode === 'acoes' ? '/api/acoes' : '/api/fiis';

            try {
                const response = await fetch(endpoint, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ ticker, profile }) 
                });

                const data = await response.json();

                if (!response.ok) {
                    container.innerHTML = `<div class="message" style="color: var(--bad); border-left: 5px solid var(--bad);">${data.error}</div>`;
                    return;
                }

                const perfilFormatado = data.perfilAtivo.charAt(0).toUpperCase() + data.perfilAtivo.slice(1);

                if (currentMode === 'acoes') {
                    container.innerHTML = `
                        <div class="results-header">Relatório Fundamentalista <span class="profile-badge">${perfilFormatado}</span><span>${data.ticker}</span></div>

                        <div class="section-title">⚖️ Valuation (Preço Justo)</div>
                        <div class="results-grid">
                            ${createCard('Cotação Atual', apenasValor(data.cotacao))}
                            ${createCard('Valor Justo (Graham Padrão)', data.valorGrahamPadrao)}
                            ${createCard('Valor Justo (Graham Rev.)', data.valorGrahamRev)}
                            ${createCard('Preço Teto (Bazin 6%)', data.precoTeto6)}
                            ${createCard('Preço Teto (Bazin 8%)', data.precoTeto8)}
                        </div>

                        <div class="section-title">🏷️ Múltiplos de Preço</div>
                        <div class="results-grid">
                            ${createCard('P/L', data.pl)}
                            ${createCard('P/VP', data.pvp)}
                        </div>

                        <div class="section-title">💰 Dividendos & Proventos</div>
                        <div class="results-grid">
                            ${createCard('DY (12M)', data.dy)}
                            ${createCard('Payout', data.payout)}
                        </div>

                        <div class="section-title">📈 Indicadores de Rentabilidade</div>
                        <div class="results-grid">
                            ${createCard('ROE', data.roe)}
                            ${createCard('ROIC', data.roic)}
                            ${createCard('ROA', data.roa)}
                            ${createCard('Margem Bruta', data.margemBruta)}
                            ${createCard('Margem EBITDA', data.margemEbitda)}
                            ${createCard('Margem Líquida', data.margemLiquida)}
                        </div>

                        <div class="section-title">🏦 Endividamento & Liquidez</div>
                        <div class="results-grid">
                            ${createCard('Dív. Líq./Patrimônio', data.divLiqPatrimonio)}
                            ${createCard('Dív. Líq./EBITDA', data.divLiqEbitda)}
                            ${createCard('Liquidez Corrente', data.liquidezCorrente)}
                        </div>

                        <div class="section-title">📊 Outros Indicadores</div>
                        <div class="results-grid">
                            ${createCard('LPA (Lucro por Ação)', apenasValor(data.lpa))}
                            ${createCard('VPA (Valor Patr. Ação)', apenasValor(data.vpa))}
                            ${createCard('CAGR Crescimento 5A', data.cagr5a)}
                            ${createCard('Giro Ativos', data.giroAtivos)}
                        </div>
                    `;
                } else {
                    container.innerHTML = `
                        <div class="results-header">Relatório do Fundo <span class="profile-badge">${perfilFormatado}</span><span>${data.ticker}</span></div>

                        <div class="section-title">❄️ Efeito Bola de Neve (EBN)</div>
                        <div class="results-grid">
                            ${createCard('Cotas p/ R$1/mês (EBN)', data.ebn)}
                            ${createCard('Valor Necessário (VN)', apenasValor(data.vn))}
                            ${createCard('Último Rendimento', apenasValor(data.ultimoRendimento))}
                        </div>

                        <div class="section-title">🏢 Indicadores do Fundo</div>
                        <div class="results-grid">
                            ${createCard('Cotação Atual', apenasValor(data.cotacao))}
                            ${createCard('P/VP', data.pvp)}
                            ${createCard('DY (12M)', data.dy)}
                            ${createCard('Liquidez Diária', data.liquidezDiaria)}
                            ${createCard('Variação (12M)', data.variacao12m)}
                            ${createCard('Val. Patr. p/ Cota', apenasValor(data.vpa))}
                            ${createCard('Valor Patrimonial', data.valorPatrimonial)}
                            ${createCard('Vacância', data.vacancia)}
                            ${createCard('Nº de Cotistas', data.numeroCotistas)}
                        </div>

                        <div class="section-title">📋 Perfil do Fundo</div>
                        <div class="results-grid">
                            ${createCard('Segmento', apenasValor(data.segmento))}
                            ${createCard('Mandato', apenasValor(data.mandato))}
                            ${createCard('Tipo de Fundo', apenasValor(data.tipoFundo))}
                            ${createCard('Tipo de Gestão', apenasValor(data.tipoGestao))}
                            ${createCard('Taxa de Admin.', data.taxaAdministracao)}
                        </div>
                    `;
                }
            } catch (error) {
                container.innerHTML = `<div class="message" style="color: var(--bad); border-color: #ef9a9a;">Erro ao conectar com o servidor local. Verifique o terminal.</div>`;
            }
        }

        document.getElementById('tickerInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') buscar();
        });
    </script>
</body>
</html>
